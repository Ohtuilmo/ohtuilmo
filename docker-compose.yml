version: '3.8'
services:
  db:
    image: postgres:10.6
    restart: always
    ports:
      - 5432:5432
    environment:
      PGDATA: /data/test
    container_name: ohtudb
    volumes:
      - pg-data:/data/test

  backend:
    image: ohtuback-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run watch
    restart: always
    ports:
      - 3001:3001
    volumes:
      - ./backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    container_name: ohtuback
    depends_on:
      - db

  frontend:
    image: ohtufront-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm start
    ports:
      - 3000:3000
    volumes:
      - ./frontend:/usr/src/app
      - frontend_node_modules:/usr/src/app/node_modules
    container_name: ohtufront
    depends_on:
      - backend
      - db


volumes:
  pg-data:
  frontend_node_modules:
  backend_node_modules: